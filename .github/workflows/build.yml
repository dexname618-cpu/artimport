name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: Android64
          combine: true

      - name: Package geode file
        run: |
          cd /home/runner/work/artimport/artimport
          ls output/ || echo "no output"
          ls build/geode/ || echo "no geode folder"
          cp build/geode/*.geode output/ 2>/dev/null || true
          geode package new build/libart-sprite-import.so --output output/dexname.art-sprite-import.geode --install-location /home/runner/work/artimport/artimport 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexname.art-sprite-import
          path: /home/runner/work/artimport/artimport/output/
          if-no-files-found: warn
