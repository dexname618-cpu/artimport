name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: Android64

      - name: Find all files
        run: find /home/runner/work -name "*.geode" 2>/dev/null || echo "Not found"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexname.art-sprite-import
          path: /home/runner/work/**/*.geode
