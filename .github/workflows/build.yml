name: Build Geode Mod

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    name: Android64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        id: build
        with:
          target: Android64

      - name: Show build output
        run: |
          echo "=== build output var ==="
          echo "${{ steps.build.outputs.build-output }}"
          echo "=== ls build folder ==="
          ls -la build/ || echo "no build folder"
          echo "=== find all files ==="
          find /home/runner/work -name "*.geode" || echo "not found"
          find /home/runner/work -name "*.so" || echo "no so files"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dexname.art-sprite-import
          path: ${{ steps.build.outputs.build-output }}
          if-no-files-found: warn
